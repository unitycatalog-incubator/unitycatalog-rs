      additionalProperties: false
      title: Value
    Volume:
      required:
        - name
        - catalog_name
        - schema_name
        - full_name
        - storage_location
        - volume_id
        - volume_type
      type: object
      properties:
        name:
          type: string
          description: Name of volume, relative to parent schema.
          minLength: 3
          pattern: ^[a-z][0-9a-z_]*[0-9a-z]$
        catalogName:
          type: string
          description: Name of parent catalog.
        schemaName:
          type: string
          description: Name of parent schema.
        fullName:
          readOnly: true
          type: string
          description: The three-level (fully qualified) name of the volume
        storageLocation:
          type: string
          description: The storage location on the cloud
        volumeId:
          readOnly: true
          type: string
          description: The unique identifier of the volume
