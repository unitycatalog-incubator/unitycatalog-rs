openapi: 3.0.3
info:
  title: ""
  version: 0.0.1
tags:
  - name: AgentSkillsService
    description: |-
      Service for managing agent skills in Unity Catalog.

       Agent skills are storage-backed directories (SKILL.md + optional resources)
       within a schema. This is an early-stage (v0alpha1) surface aligned with the
       Open Sharing agent-skill community proposal.
  - name: AgentsService
    description: |-
      Service for managing agents in Unity Catalog.

       Agents are remote invocable services (endpoint + invocation protocol) within a
       schema. This is an early-stage (v0alpha1) surface aligned with the Open
       Sharing agent community proposal.
  - name: CatalogsService
    description: Manage catalogs and schemas in the service.
  - name: CredentialsService
    description: |-
      Manage credentials to access external data sources and services
       as well as generate signed urls for the Delta Sharing service.
  - name: DeltaCommitsService
    description: |-
      Service implementing the Delta catalog-managed commits ("commit coordinator")
       protocol. The catalog is the source of truth for which commit wins each
       version.
  - name: EntityTagAssignmentsService
    description: Manage assignments of tags to Unity Catalog entities.
  - name: ExternalLocationsService
    description: |-
      Service for managing external locations in Unity Catalog.
       External locations define cloud storage paths accessible via storage credentials.
  - name: FunctionsService
    description: Manage User-Defined Functions (UDFs) in the service.
  - name: ProvidersService
    description: |-
      Providers

       A provider represents an organization that shares data with this metastore.
       It is the inbound counterpart of a recipient: registered from a share
       activation/credential file and used to access shares offered by an upstream
       Delta Sharing server.
  - name: RecipientsService
    description: |-
      Recipients

       A recipient is an object you create using recipients/create to represent an organization which
       you want to allow access shares. when you create a recipient object, Unity Catalog generates an
       activation link you can send to the recipient. The recipient follows the activation link to download
       the credential file, and then uses the credential file to establish a secure connection to receive
       the shared data. This sharing mode is called open sharing.
  - name: SchemasService
    description: |-
      A schema (also called a database) is the second layer of Unity Catalog’s three-level namespace.
       A schema organizes tables, views and functions. To access (or list) a table or view in a schema,
       users must have the USE_SCHEMA data permission on the schema and its parent catalog, and they must
       have the SELECT permission on the table or view.
  - name: SharesService
    description: Service for managing shares
  - name: StagingTablesService
    description: |-
      A staging table reserves an id and storage location for a Unity Catalog
       managed table. After creating one, the client writes the initial Delta commit
       at the returned staging_location and finalizes the table via CreateTable.
  - name: TablesService
    description: |-
      Service for managing tables in Unity Catalog.
       Tables represent structured data stored in a schema, supporting managed and external storage formats.
  - name: TagPoliciesService
    description: Manage governed tag definitions (tag policies).
  - name: TemporaryCredentialsService
    description: |-
      Service for generating temporary credentials to access tables and storage paths.
       Credentials are short-lived and scoped to a specific operation (read or read/write).
  - name: VolumesService
    description: |-
      Service for managing volumes in Unity Catalog.
       Volumes represent logical storage locations (managed or external) within a schema.
paths:
  /agent-skills:
    get:
      tags:
        - AgentSkillsService
      description: Lists agent skills.
      operationId: ListAgentSkills
      parameters:
        - name: catalogName
          in: query
          description: The identifier of the catalog.
          schema:
            type: string
        - name: schemaName
          in: query
          description: The identifier of the schema.
          schema:
            type: string
        - name: maxResults
          in: query
          description: The maximum number of results per page that should be returned.
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          description: Opaque pagination token to go to next page based on previous query.
          schema:
            type: string
        - name: includeBrowse
          in: query
          description: |-
            Whether to include agent skills in the response for which the principal can
             only access selective metadata for.
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAgentSkillsResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    post:
      tags:
        - AgentSkillsService
      operationId: CreateAgentSkill
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentSkillRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSkill"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /agent-skills/{name}:
    get:
      tags:
        - AgentSkillsService
      operationId: GetAgentSkill
      parameters:
        - name: name
          in: path
          description: The three-level (fully qualified) name of the agent skill.
          required: true
          schema:
            type: string
        - name: includeBrowse
          in: query
          description: |-
            Whether to include agent skills in the response for which the principal can
             only access selective metadata for.
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSkill"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    delete:
      tags:
        - AgentSkillsService
      operationId: DeleteAgentSkill
      parameters:
        - name: name
          in: path
          description: The three-level (fully qualified) name of the agent skill.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content: {}
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    patch:
      tags:
        - AgentSkillsService
      operationId: UpdateAgentSkill
      parameters:
        - name: name
          in: path
          description: The three-level (fully qualified) name of the agent skill.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentSkillRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSkill"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /agents:
    get:
      tags:
        - AgentsService
      description: Lists agents.
      operationId: ListAgents
      parameters:
        - name: catalogName
          in: query
          description: The identifier of the catalog.
          schema:
            type: string
        - name: schemaName
          in: query
          description: The identifier of the schema.
          schema:
            type: string
        - name: maxResults
          in: query
          description: The maximum number of results per page that should be returned.
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          description: Opaque pagination token to go to next page based on previous query.
          schema:
            type: string
        - name: includeBrowse
          in: query
          description: |-
            Whether to include agents in the response for which the principal can only
             access selective metadata for.
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAgentsResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    post:
      tags:
        - AgentsService
      operationId: CreateAgent
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /agents/{name}:
    get:
      tags:
        - AgentsService
      operationId: GetAgent
      parameters:
        - name: name
          in: path
          description: The three-level (fully qualified) name of the agent.
          required: true
          schema:
            type: string
        - name: includeBrowse
          in: query
          description: |-
            Whether to include agents in the response for which the principal can only
             access selective metadata for.
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    delete:
      tags:
        - AgentsService
      operationId: DeleteAgent
      parameters:
        - name: name
          in: path
          description: The three-level (fully qualified) name of the agent.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content: {}
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    patch:
      tags:
        - AgentsService
      operationId: UpdateAgent
      parameters:
        - name: name
          in: path
          description: The three-level (fully qualified) name of the agent.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /catalogs:
    get:
      tags:
        - CatalogsService
      description: |-
        List catalogs

         Gets an array of catalogs in the metastore. If the caller is the metastore admin,
         all catalogs will be retrieved. Otherwise, only catalogs owned by the caller
         (or for which the caller has the USE_CATALOG privilege) will be retrieved.
         There is no guarantee of a specific ordering of the elements in the array.
      operationId: ListCatalogs
      parameters:
        - name: maxResults
          in: query
          description: The maximum number of results per page that should be returned.
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          description: Opaque pagination token to go to next page based on previous query.
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCatalogsResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    post:
      tags:
        - CatalogsService
      description: |-
        Create a new catalog

         Creates a new catalog instance in the parent metastore if the caller
         is a metastore admin or has the CREATE_CATALOG privilege.
      operationId: CreateCatalog
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCatalogRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Catalog"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /catalogs/{name}:
    get:
      tags:
        - CatalogsService
      description: |-
        Get a catalog

         Gets the specified catalog in a metastore. The caller must be a metastore admin,
         the owner of the catalog, or a user that has the USE_CATALOG privilege set for their account.
      operationId: GetCatalog
      parameters:
        - name: name
          in: path
          description: Name of catalog.
          required: true
          schema:
            type: string
        - name: includeBrowse
          in: query
          description: Whether to include catalogs in the response for which the principal can only access selective metadata for
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Catalog"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    delete:
      tags:
        - CatalogsService
      description: |-
        Delete a catalog

         Deletes the catalog that matches the supplied name. The caller must
         be a metastore admin or the owner of the catalog.
      operationId: DeleteCatalog
      parameters:
        - name: name
          in: path
          description: Name of catalog.
          required: true
          schema:
            type: string
        - name: force
          in: query
          description: Force deletion even if the catalog is not empty.
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content: {}
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    patch:
      tags:
        - CatalogsService
      description: |-
        Update a catalog

         Updates the catalog that matches the supplied name. The caller must be either
         the owner of the catalog, or a metastore admin (when changing the owner field of the catalog).
      operationId: UpdateCatalog
      parameters:
        - name: name
          in: path
          description: Name of catalog.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCatalogRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Catalog"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /credentials:
    get:
      tags:
        - CredentialsService
      operationId: ListCredentials
      parameters:
        - name: purpose
          in: query
          description: Return only credentials for the specified purpose.
          schema:
            type: integer
            format: enum
        - name: maxResults
          in: query
          description: The maximum number of results per page that should be returned.
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          description: Opaque pagination token to go to next page based on previous query.
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCredentialsResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    post:
      tags:
        - CredentialsService
      operationId: CreateCredential
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCredentialRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credential"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /credentials/{name}:
    get:
      tags:
        - CredentialsService
      operationId: GetCredential
      parameters:
        - name: name
          in: path
          description: Name of credential.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credential"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    delete:
      tags:
        - CredentialsService
      operationId: DeleteCredential
      parameters:
        - name: name
          in: path
          description: Name of credential.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content: {}
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    patch:
      tags:
        - CredentialsService
      operationId: UpdateCredential
      parameters:
        - name: name
          in: path
          description: Name of credential.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCredentialRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credential"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /delta/preview/commits:
    get:
      tags:
        - DeltaCommitsService
      description: |-
        Return ratified-but-unpublished commits for a table, plus the latest
         version the catalog tracks.
      operationId: GetCommits
      parameters:
        - name: tableId
          in: query
          description: UUID of the catalog-managed table.
          schema:
            type: string
        - name: tableUri
          in: query
          description: The storage URI of the table.
          schema:
            type: string
        - name: startVersion
          in: query
          description: The lowest version to return (inclusive). Defaults to 0.
          schema:
            type: string
        - name: endVersion
          in: query
          description: |-
            The highest version to return (inclusive). When set, must be
             `>= start_version`. Defaults to the latest version.
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCommitsResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    post:
      tags:
        - DeltaCommitsService
      description: |-
        Ratify a staged commit at the requested version (first-writer-wins), and/or
         notify the catalog that commits have been backfilled to the Delta log.
      operationId: Commit
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommitRequest"
        required: true
      responses:
        "200":
          description: OK
          content: {}
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /entity-tag-assignments:
    post:
      tags:
        - EntityTagAssignmentsService
      description: |-
        Create an entity tag assignment

         Assigns a tag to a Unity Catalog entity.
      operationId: CreateEntityTagAssignment
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEntityTagAssignmentRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityTagAssignment"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /entity-tag-assignments/{entityType}/{entityName}/tags:
    get:
      tags:
        - EntityTagAssignmentsService
      description: |-
        List entity tag assignments

         Gets the tag assignments for the specified entity.
      operationId: ListEntityTagAssignments
      parameters:
        - name: entityType
          in: path
          description: The type of the entity whose tag assignments to list.
          required: true
          schema:
            type: string
        - name: entityName
          in: path
          description: The fully qualified name of the entity whose tag assignments to list.
          required: true
          schema:
            type: string
        - name: maxResults
          in: query
          description: The maximum number of results per page that should be returned.
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          description: Opaque pagination token to go to next page based on previous query.
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEntityTagAssignmentsResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /entity-tag-assignments/{entityType}/{entityName}/tags/{tagKey}:
    get:
      tags:
        - EntityTagAssignmentsService
      description: |-
        Get an entity tag assignment

         Gets the tag assignment for the specified entity and tag key.
      operationId: GetEntityTagAssignment
      parameters:
        - name: entityType
          in: path
          description: The type of the entity to which the tag is assigned.
          required: true
          schema:
            type: string
        - name: entityName
          in: path
          description: The fully qualified name of the entity to which the tag is assigned.
          required: true
          schema:
            type: string
        - name: tagKey
          in: path
          description: The key of the tag.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityTagAssignment"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    delete:
      tags:
        - EntityTagAssignmentsService
      description: |-
        Delete an entity tag assignment

         Deletes the tag assignment for the specified entity and tag key.
      operationId: DeleteEntityTagAssignment
      parameters:
        - name: entityType
          in: path
          description: The type of the entity to which the tag is assigned.
          required: true
          schema:
            type: string
        - name: entityName
          in: path
          description: The fully qualified name of the entity to which the tag is assigned.
          required: true
          schema:
            type: string
        - name: tagKey
          in: path
          description: The key of the tag to delete.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content: {}
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    patch:
      tags:
        - EntityTagAssignmentsService
      description: |-
        Update an entity tag assignment

         Updates the tag assignment for the specified entity and tag key.
      operationId: UpdateEntityTagAssignment
      parameters:
        - name: entityType
          in: path
          description: The type of the entity to which the tag is assigned.
          required: true
          schema:
            type: string
        - name: entityName
          in: path
          description: The fully qualified name of the entity to which the tag is assigned.
          required: true
          schema:
            type: string
        - name: tagKey
          in: path
          description: The key of the tag to update.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEntityTagAssignmentRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityTagAssignment"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /external-locations:
    get:
      tags:
        - ExternalLocationsService
      description: List external locations
      operationId: ListExternalLocations
      parameters:
        - name: maxResults
          in: query
          description: The maximum number of results per page that should be returned.
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          description: Opaque pagination token to go to next page based on previous query.
          schema:
            type: string
        - name: includeBrowse
          in: query
          description: Whether to include schemas in the response for which the principal can only access selective metadata for
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListExternalLocationsResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    post:
      tags:
        - ExternalLocationsService
      description: Create a new external location
      operationId: CreateExternalLocation
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExternalLocationRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalLocation"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /external-locations/{name}:
    get:
      tags:
        - ExternalLocationsService
      description: Get an external location
      operationId: GetExternalLocation
      parameters:
        - name: name
          in: path
          description: Name of external location.
          required: true
          schema:
