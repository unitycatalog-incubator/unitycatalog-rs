openapi: 3.0.3
info:
  title: Unity Catalog API
  version: 0.0.1
  description: REST API for managing Unity Catalog resources including catalogs, schemas, tables, volumes, external locations, and temporary credentials.
tags:
  - name: CatalogsService
    description: Manage catalogs and schemas in the service.
  - name: CredentialsService
    description: |-
      Manage credentials to access external data sources and services
       as well as generate signed urls for the Delta Sharing service.
  - name: ExternalLocationsService
    description: |-
      Service for managing external locations in Unity Catalog.
       External locations define cloud storage paths accessible via storage credentials.
  - name: FunctionsService
    description: Manage User-Defined Functions (UDFs) in the service.
  - name: RecipientsService
    description: |-
      Recipients

       A recipient is an object you create using recipients/create to represent an organization which
       you want to allow access shares. when you create a recipient object, Unity Catalog generates an
       activation link you can send to the recipient. The recipient follows the activation link to download
       the credential file, and then uses the credential file to establish a secure connection to receive
       the shared data. This sharing mode is called open sharing.
  - name: SchemasService
    description: |-
      A schema (also called a database) is the second layer of Unity Catalog’s three-level namespace.
       A schema organizes tables, views and functions. To access (or list) a table or view in a schema,
       users must have the USE_SCHEMA data permission on the schema and its parent catalog, and they must
       have the SELECT permission on the table or view.
  - name: SharesService
    description: Service for managing shares
  - name: TablesService
    description: |-
      Service for managing tables in Unity Catalog.
       Tables represent structured data stored in a schema, supporting managed and external storage formats.
  - name: TemporaryCredentialsService
    description: |-
      Service for generating temporary credentials to access tables and storage paths.
       Credentials are short-lived and scoped to a specific operation (read or read/write).
  - name: VolumesService
    description: |-
      Service for managing volumes in Unity Catalog.
       Volumes represent logical storage locations (managed or external) within a schema.
paths:
  /catalogs:
    get:
      tags:
        - CatalogsService
      description: |-
        List catalogs

         Gets an array of catalogs in the metastore. If the caller is the metastore admin,
         all catalogs will be retrieved. Otherwise, only catalogs owned by the caller
         (or for which the caller has the USE_CATALOG privilege) will be retrieved.
         There is no guarantee of a specific ordering of the elements in the array.
      operationId: ListCatalogs
      parameters:
        - name: maxResults
          in: query
          description: The maximum number of results per page that should be returned.
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          description: Opaque pagination token to go to next page based on previous query.
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCatalogsResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    post:
      tags:
        - CatalogsService
      description: |-
        Create a new catalog

         Creates a new catalog instance in the parent metastore if the caller
         is a metastore admin or has the CREATE_CATALOG privilege.
      operationId: CreateCatalog
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCatalogRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Catalog"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /catalogs/{name}:
    get:
      tags:
        - CatalogsService
      description: |-
        Get a catalog

         Gets the specified catalog in a metastore. The caller must be a metastore admin,
         the owner of the catalog, or a user that has the USE_CATALOG privilege set for their account.
      operationId: GetCatalog
      parameters:
        - name: name
          in: path
          description: Name of catalog.
          required: true
          schema:
            type: string
        - name: includeBrowse
          in: query
          description: Whether to include catalogs in the response for which the principal can only access selective metadata for
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Catalog"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    delete:
      tags:
        - CatalogsService
      description: |-
        Delete a catalog

         Deletes the catalog that matches the supplied name. The caller must
         be a metastore admin or the owner of the catalog.
      operationId: DeleteCatalog
      parameters:
        - name: name
          in: path
          description: Name of catalog.
          required: true
          schema:
            type: string
        - name: force
          in: query
          description: Force deletion even if the catalog is not empty.
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content: {}
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    patch:
      tags:
        - CatalogsService
      description: |-
        Update a catalog

         Updates the catalog that matches the supplied name. The caller must be either
         the owner of the catalog, or a metastore admin (when changing the owner field of the catalog).
      operationId: UpdateCatalog
      parameters:
        - name: name
          in: path
          description: Name of catalog.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCatalogRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Catalog"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /credentials:
    get:
      tags:
        - CredentialsService
      operationId: ListCredentials
      parameters:
        - name: purpose
          in: query
          description: Return only credentials for the specified purpose.
          schema:
            type: integer
            format: enum
        - name: maxResults
          in: query
          description: The maximum number of results per page that should be returned.
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          description: Opaque pagination token to go to next page based on previous query.
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCredentialsResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    post:
      tags:
        - CredentialsService
      operationId: CreateCredential
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCredentialRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credential"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /credentials/{name}:
    get:
      tags:
        - CredentialsService
      operationId: GetCredential
      parameters:
        - name: name
          in: path
          description: Name of credential.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credential"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    delete:
      tags:
        - CredentialsService
      operationId: DeleteCredential
      parameters:
        - name: name
          in: path
          description: Name of credential.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content: {}
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    patch:
      tags:
        - CredentialsService
      operationId: UpdateCredential
      parameters:
        - name: name
          in: path
          description: Name of credential.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCredentialRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credential"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /external-locations:
    get:
      tags:
        - ExternalLocationsService
      description: List external locations
      operationId: ListExternalLocations
      parameters:
        - name: maxResults
          in: query
          description: The maximum number of results per page that should be returned.
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          description: Opaque pagination token to go to next page based on previous query.
          schema:
            type: string
        - name: includeBrowse
          in: query
          description: Whether to include schemas in the response for which the principal can only access selective metadata for
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListExternalLocationsResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    post:
      tags:
        - ExternalLocationsService
      description: Create a new external location
      operationId: CreateExternalLocation
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExternalLocationRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalLocation"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /external-locations/{name}:
    get:
      tags:
        - ExternalLocationsService
      description: Get an external location
      operationId: GetExternalLocation
      parameters:
        - name: name
          in: path
          description: Name of external location.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalLocation"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    delete:
      tags:
        - ExternalLocationsService
      description: Delete an external location
      operationId: DeleteExternalLocation
      parameters:
        - name: name
          in: path
          description: Name of external location.
          required: true
          schema:
            type: string
        - name: force
          in: query
          description: Force deletion even if the external location is not empty.
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content: {}
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    patch:
      tags:
        - ExternalLocationsService
      description: Update an external location
      operationId: UpdateExternalLocation
      parameters:
        - name: name
          in: path
          description: Name of external location.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExternalLocationRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalLocation"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /functions:
    get:
      tags:
        - FunctionsService
      description: |-
        List functions

         List functions within the specified parent catalog and schema. If the caller is the metastore
         admin, all functions are returned in the response. Otherwise, the caller must have USE_CATALOG
         on the parent catalog and USE_SCHEMA on the parent schema, and the function must either be
         owned by the caller or have SELECT on the function.
      operationId: ListFunctions
      parameters:
        - name: catalogName
          in: query
          description: Name of parent catalog for functions of interest.
          schema:
            type: string
        - name: schemaName
          in: query
          description: Parent schema of functions.
          schema:
            type: string
        - name: maxResults
          in: query
          description: The maximum number of results per page that should be returned.
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          description: Opaque pagination token to go to next page based on previous query.
          schema:
            type: string
        - name: includeBrowse
          in: query
          description: Whether to include functions in the response for which the principal can only access selective metadata for.
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFunctionsResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    post:
      tags:
        - FunctionsService
      description: |-
        Create a function

         Creates a new function. The caller must be a metastore admin or have the CREATE_FUNCTION
         privilege on the parent catalog and schema.
      operationId: CreateFunction
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFunctionRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Function"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /functions/{name}:
    get:
      tags:
        - FunctionsService
      description: |-
        Get a function

         Gets a function from within a parent catalog and schema. For the fetch to succeed,
         the caller must be a metastore admin, the owner of the function, or have SELECT on
         the function.
      operationId: GetFunction
      parameters:
        - name: name
          in: path
          description: "The fully-qualified name of the function (three-level name: catalog.schema.function)."
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Function"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    delete:
      tags:
        - FunctionsService
      description: |-
        Delete a function

         Deletes the function that matches the supplied name. For the deletion to succeed,
         the caller must be the owner of the function.
      operationId: DeleteFunction
      parameters:
        - name: name
          in: path
          description: "The fully-qualified name of the function (three-level name: catalog.schema.function)."
          required: true
          schema:
            type: string
        - name: force
          in: query
          description: Force deletion even if the function is not empty.
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content: {}
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    patch:
      tags:
        - FunctionsService
      description: |-
        Update a function

         Updates the function that matches the supplied name. Only the owner of the function
         can be updated.
      operationId: UpdateFunction
      parameters:
        - name: name
          in: path
          description: "The fully-qualified name of the function (three-level name: catalog.schema.function)."
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFunctionRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Function"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /recipients:
    get:
      tags:
        - RecipientsService
      description: List recipients.
      operationId: ListRecipients
      parameters:
        - name: maxResults
          in: query
          description: The maximum number of results per page that should be returned.
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          description: Opaque pagination token to go to next page based on previous query.
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRecipientsResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    post:
      tags:
        - RecipientsService
      description: Create a new recipient.
      operationId: CreateRecipient
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecipientRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipient"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /recipients/{name}:
    get:
      tags:
        - RecipientsService
      description: Get a recipient by name.
      operationId: GetRecipient
      parameters:
        - name: name
          in: path
          description: Name of the recipient.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipient"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    delete:
      tags:
        - RecipientsService
      description: Delete a recipient.
      operationId: DeleteRecipient
      parameters:
        - name: name
          in: path
          description: Name of the recipient.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content: {}
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    patch:
      tags:
        - RecipientsService
      description: Update a recipient.
      operationId: UpdateRecipient
      parameters:
        - name: name
          in: path
          description: Name of the recipient.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRecipientRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipient"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /schemas:
    get:
      tags:
        - SchemasService
      description: |-
        Gets an array of schemas for a catalog in the metastore. If the caller is the metastore
         admin or the owner of the parent catalog, all schemas for the catalog will be retrieved.
         Otherwise, only schemas owned by the caller (or for which the caller has the USE_SCHEMA privilege)
         will be retrieved. There is no guarantee of a specific ordering of the elements in the array.
      operationId: ListSchemas
      parameters:
        - name: catalogName
          in: query
          description: Name of parent catalog.
          schema:
            type: string
        - name: maxResults
          in: query
          description: The maximum number of results per page that should be returned.
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          description: Opaque pagination token to go to next page based on previous query.
          schema:
            type: string
        - name: includeBrowse
          in: query
          description: Whether to include schemas in the response for which the principal can only access selective metadata for
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSchemasResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    post:
      tags:
        - SchemasService
      description: |-
        Creates a new schema for catalog in the Metatastore. The caller must be a metastore admin,
         or have the CREATE_SCHEMA privilege in the parent catalog.
      operationId: CreateSchema
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSchemaRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schema"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /schemas/{fullName}:
    get:
      tags:
        - SchemasService
      description: |-
        Gets the specified schema within the metastore.
         The caller must be a metastore admin, the owner of the schema,
         or a user that has the USE_SCHEMA privilege on the schema.
      operationId: GetSchema
      parameters:
        - name: fullName
          in: path
          description: |-
            Full name of schema.

             Format: catalog_name.schema_name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schema"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    delete:
      tags:
        - SchemasService
      description: |-
        Deletes the specified schema from the parent catalog. The caller must be the owner
         of the schema or an owner of the parent catalog.
      operationId: DeleteSchema
      parameters:
        - name: fullName
          in: path
          description: |-
            Full name of schema to delete.

             Format: catalog_name.schema_name
          required: true
          schema:
            type: string
        - name: force
          in: query
          description: Force deletion even if the schema is not empty.
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content: {}
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    patch:
      tags:
        - SchemasService
      description: |-
        Updates a schema for a catalog. The caller must be the owner of the schema or a metastore admin.
         If the caller is a metastore admin, only the owner field can be changed in the update.
         If the name field must be updated, the caller must be a metastore admin or have the CREATE_SCHEMA
         privilege on the parent catalog.
      operationId: UpdateSchema
      parameters:
        - name: fullName
          in: path
          description: Full name of schema, in form of catalog_name.schema_name.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSchemaRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schema"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /shares:
    get:
      tags:
        - SharesService
      description: List shares.
      operationId: ListShares
      parameters:
        - name: maxResults
          in: query
          description: The maximum number of results per page that should be returned.
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          description: Opaque pagination token to go to next page based on previous query.
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSharesResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    post:
      tags:
        - SharesService
      description: Create a new share.
      operationId: CreateShare
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShareRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Share"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /shares/{name}:
    get:
      tags:
        - SharesService
