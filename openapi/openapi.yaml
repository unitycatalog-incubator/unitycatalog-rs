          description: Array of dependencies.
      description: A list of dependencies referenced by a view-like table.
      additionalProperties: false
      title: Dependency List
    Discriminator:
      type: object
      properties:
        propertyName:
          type: string
        mapping:
          $ref: "#/components/schemas/Strings"
        specificationExtension:
          type: array
          items:
            $ref: "#/components/schemas/NamedAny"
      description: When request bodies or response payloads may be one of a number of different schemas, a `discriminator` object can be used to aid in serialization, deserialization, and validation.  The discriminator is a specific object in a schema which is used to inform the consumer of the specification of an alternative schema based on the value associated with it.  When using the discriminator, _inline_ schemas will not be considered.
    EntityTagAssignment:
      required:
        - entity_type
        - entity_name
        - tag_key
      type: object
      properties:
        entityType:
          type: string
          description: |-
            The type of the entity to which the tag is assigned.

             Supported values: catalogs, schemas, tables, columns, volumes.
        entityName:
          type: string
          description: The fully qualified name of the entity to which the tag is assigned.
        tagKey:
          type: string
          description: The key of the tag.
        tagValue:
          type: string
          description: The value of the tag.
      description: |-
        Unlike a TagPolicy (a governed-tag *definition*), an assignment is the application
         of a tag to a specific securable. It has no identifier of its own — its identity is
         the composite of (entity_type, entity_name, tag_key). It is intentionally NOT a
         `google.api.resource`: assignments are stored as associations between the entity and
         its tag, not as standalone objects.
      additionalProperties: false
      title: The assignment of a tag to a Unity Catalog entity.
    ExternalDocs:
