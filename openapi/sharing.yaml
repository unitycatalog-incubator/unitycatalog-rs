        accessKeyId:
          type: string
          description: The access key ID that identifies the temporary credentials.
        secretAccessKey:
          type: string
          description: The secret access key used to sign AWS API requests.
        sessionToken:
          type: string
          description: The session token passed to the AWS API alongside the access key.
      description: Temporary credentials for AWS S3.
    SharingAzureUserDelegationSas:
      required:
      - sasToken
      type: object
      properties:
        sasToken:
          type: string
          description: The SAS token granting read access to the asset's storage location.
      description: User delegation SAS token for Azure Blob Storage.
    SharingGcpOauthToken:
      required:
      - oauthToken
      type: object
      properties:
        oauthToken:
          type: string
          description: The OAuth token granting read access to the asset's storage location.
      description: OAuth token for Google Cloud Storage.
    SharingR2Credentials:
      required:
      - accessKeyId
      - secretAccessKey
      - sessionToken
      type: object
      properties:
        accessKeyId:
          type: string
          description: The access key ID that identifies the temporary credentials.
        secretAccessKey:
          type: string
          description: The secret access key used to sign requests.
        sessionToken:
          type: string
          description: The session token passed alongside the access key.
      description: Temporary credentials for Cloudflare R2.
    SharingSkill:
      required:
      - name
      - schema
      - share
      type: object
      properties:
        name:
          type: string
          description: The name of the skill. It's case-insensitive and unique within a schema.
        schema:
          type: string
          description: The schema name that the skill belongs to. It's case-insensitive.
        share:
          type: string
          description: The share name that the skill belongs to. It's case-insensitive.
        id:
          readOnly: true
          type: string
          description: Unique identifier for the skill.
        shareId:
          readOnly: true
          type: string
          description: A unique identifier for the share this skill belongs to.
        storageLocation:
          readOnly: true
          type: string
          description: The fully qualified storage location of the skill's directory.
        description:
          type: string
          description: A human-readable description of what the skill does.
        license:
          type: string
          description: SPDX license identifier or free-form license text for the skill.
        allowedTools:
          type: array
          items:
            type: string
          description: The tools the skill is permitted to use, as declared in its SKILL.md.
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Arbitrary additional metadata declared by the skill.
      description: "An agent skill shared as a storage-backed asset.\n\n A skill is a directory of files (a required `SKILL.md` plus optional\n `scripts/`, `references/`, and `assets/`) that an agent loads and executes.\n It is backed by its own storage location; the recipient reads its files via\n credentials from the `temporary-skill-credentials` endpoint."
    SharingTemporaryCredentials:
      type: object
      properties:
        expirationTime:
          readOnly: true
          type: string
          description: Server time when the credential expires, in epoch milliseconds.
        url:
          readOnly: true
          type: string
          description: The storage location URL the credential grants access to.
        awsTempCredentials:
          allOf:
          - $ref: '#/components/schemas/SharingAwsCredentials'
          description: Temporary credentials for AWS S3.
        azureUserDelegationSas:
          allOf:
          - $ref: '#/components/schemas/SharingAzureUserDelegationSas'
          description: User delegation SAS token for Azure Blob Storage.
        gcpOauthToken:
          allOf:
          - $ref: '#/components/schemas/SharingGcpOauthToken'
          description: OAuth token for Google Cloud Storage.
        r2Credentials:
          allOf:
          - $ref: '#/components/schemas/SharingR2Credentials'
          description: Temporary credentials for Cloudflare R2.
      description: "Temporary cloud credentials scoped to a storage-backed asset's location.\n\n Returned by the `temporary-*-credentials` endpoints for volumes, agent\n skills, and other storage-backed assets. Exactly one credential variant is\n populated; the recipient uses it to read files directly via the cloud storage\n API. Clients should cache the credential until `expiration_time`.\n\n Names are prefixed with `Sharing` to avoid colliding with the Unity Catalog\n `TemporaryCredential` schema in the shared OpenAPI document."
    SharingVolume:
      required:
      - name
      - schema
      - share
      type: object
      properties:
        name:
          type: string
          description: The name of the volume. It's case-insensitive and unique within a schema.
        schema:
          type: string
          description: The schema name that the volume belongs to. It's case-insensitive.
        share:
          type: string
          description: The share name that the volume belongs to. It's case-insensitive.
        id:
          readOnly: true
          type: string
          description: Unique identifier for the volume.
        shareId:
          readOnly: true
          type: string
          description: A unique identifier for the share this volume belongs to.
        storageLocation:
          readOnly: true
          type: string
          description: The fully qualified storage location of the volume.
      description: "A volume shared as a storage-backed asset.\n\n A volume groups unstructured files under a single storage location; the\n recipient lists and reads its files directly via the cloud storage API using\n credentials from the `temporary-volume-credentials` endpoint."
    Status:
      type: object
      properties:
        code:
          type: integer
          description: The status code, which should be an enum value of [google.rpc.Code][google.rpc.Code].
          format: int32
        message:
          type: string
          description: A developer-facing error message, which should be in English. Any user-facing error message should be localized and sent in the [google.rpc.Status.details][google.rpc.Status.details] field, or localized by the client.
        details:
          type: array
          items:
            $ref: '#/components/schemas/GoogleProtobufAny'
          description: A list of messages that carry the error details.  There is a common set of message types for APIs to use.
      description: 'The `Status` type defines a logical error model that is suitable for different programming environments, including REST APIs and RPC APIs. It is used by [gRPC](https://github.com/grpc). Each `Status` message contains three pieces of data: error code, error message, and error details. You can find out more about this error model and how to work with it in the [API Design Guide](https://cloud.google.com/apis/design/errors).'
    Table:
      type: object
      properties:
        name:
          type: string
          description: The name of the table.
        schema:
          type: string
          description: The schema name that the table belongs to.
        share:
          type: string
          description: The share name that the table belongs to.
        id:
          readOnly: true
          type: string
          description: Unique identifier for the table.
        shareId:
          readOnly: true
          type: string
          description: A unique identifier for the share this table belongs to.
        location:
          readOnly: true
          type: string
          description: "The fully qualified location of the table.\n\n Required when the table is shared with directory-based access (`dir`)."
        auxiliaryLocations:
          readOnly: true
          type: array
          items:
            type: string
          description: Additional locations referenced by the table (e.g. for multi-location tables).
        accessModes:
          readOnly: true
          type: array
          items:
            type: string
          description: The access modes supported for this table (e.g. `url`, `dir`).
      description: A table is a Delta Lake table or a view on top of a Delta Lake table.
    Ops:
      type: string
      enum:
      - column
      - literal
      - isNull
      - equal
      - lessThan
      - lessThanOrEqual
      - greaterThan
      - greaterThanOrEqual
      - and
      - or
      - not
      description: "Op \t                Op Type \tDescription\ncolumn \t            Leaf \tRepresents a column. A column op has two fields: name and valueType. The column's value will be cast to the specified valueType during comparisons.\nliteral \t        Leaf    Represents a literal or fixed value. A literal op has two fields: value and valueType. The literal's value will be cast to the specified valueType during comparisons.\nisNull \t            Unary \tRepresents a null check on a column op. This op should have only one child, the column op.\nequal \t            Binary \tRepresents an equality (\"=\") check. This op should have two children, and both should be leaf ops.\nlessThan \t        Binary \tRepresents a less than (\"<\") check. This op should have two children, and both should be leaf ops.\nlessThanOrEqual\t    Binary \tRepresents a less than or equal (\"<=\") check. This op should have two children, and both should be leaf ops.\ngreaterThan \t    Binary \tRepresents a greater\
        \ than (\">\") check. This op should have two children, and both should be leaf ops.\ngreaterThanOrEqual \tBinary \tRepresents a greater than (\">=\") check. This op should have two children, and both should be leaf ops.\nand \t            Nary \tRepresents a logical and operation amongst its children. This op should have at least two children.\nor \t                Nary \tRepresents a logical or operation amongst its children. This op should have at least two children.\nnot \t            Unary \tRepresents a logical not check. This op should have once child.\nThe supported value types:\n  ValueType \tDescription\n  \"bool\" \tRepresents an Boolean type.\n  \"int\" \tRepresents an Integer type.\n  \"long\" \tRepresents a Long type.\n  \"string\" \tRepresents a String type.\n  \"date\" \tRepresents a Date type in \"yyyy-mm-dd\" format.\n"
    TableMetadataResponse:
      type: string
      example: '{"protocol":{"minReaderVersion":1}}

        {"metaData":{"id":"f8d5c169-3d01-4ca3-ad9e-7dc3355aedb2","format":{"provider":"parquet"},"schemaString":"{\"type\":\"struct\",\"fields\":[{\"name\":\"eventTime\",\"type\":\"timestamp\",\"nullable\":true,\"metadata\":{}},{\"name\":\"date\",\"type\":\"date\",\"nullable\":true,\"metadata\":{}}]}","partitionColumns":["date"]}}

        '
    QueryRequest:
      type: object
      properties:
        predicateHints:
          type: array
          description: "a list of SQL boolean expressions using a restricted subset of SQL, in a JSON array.\nWhen it\u2019s present, the server will use the provided predicates as a hint to apply the\nSQL predicates on the returned files. Filtering files based on the SQL predicates\nis BEST EFFORT. The server may return files that don\u2019t satisfy the predicates.\nIf the server fails to parse one of the SQL predicates, or fails to evaluate it, the\nserver may skip it. Predicate expressions are conjunctive (AND-ed together).\nWhen it\u2019s absent, the server will return all of files in the table.\nThis will be deprecated once all the client and server implementation move to using jsonPredicateHints below.\n"
          example:
          - col = 123
          items:
            type: string
        jsonPredicateHints:
          type: object
          description: "query predicates on partition columns specified using a structured JSON format.\nWhen it\u2019s present, the server will try to use the predicates to filter table's\nfiles, which could boost query performance.\nAs with predicateHints, this filtering is BEST EFFORT. The server may return files\nthat don\u2019t satisfy the predicates.\nIf the server encounters any errors during predicate processing (for example, invalid\nsyntax or non existing columns), it will skip filtering and return all the files.\nWhen it\u2019s absent, the server will return all the files in the table.\n"
          properties:
            op:
              $ref: '#/components/schemas/Ops'
            children:
              type: string
            name:
              type: string
            value:
              type: string
            valueType:
              type: string
        limitHint:
          type: integer
          example: 1000
          description: "It\u2019s a hint from the client to tell the server how many rows the\nclient plans to read. The server can use this hint to return only\nsome files by using the stats in the Delta transaction logs. For\nexample, when running SELECT * FROM table LIMIT 1000, the client\ncan send limit=1000 to the server\n"
        version:
          type: integer
          description: 'an optional version number. If set, will return files as of the

            specified version of the table. This is only supported on tables

            with history sharing enabled.

            '
          example: 1005
        timestamp:
          type: string
          example: yyyy-[m]m-[d]d hh:mm:ss[.f...]
          description: 'an optional timestamp string in the Timestamp Format,. If set, will

            return files as of the table version corresponding to the specified

            timestamp. This is only supported on tables with history sharing enabled.

            '
        startingVersion:
          type: integer
          example: 1000
          description: 'an optional version number. If set, will return all data change files

            since startingVersion, inclusive, including historical metadata if seen

            in the delta log.

            '
        endingVersion:
          type: integer
          example: 1000
          description: 'an optional version number, only used if startingVersion is set. If set,

            the server can use it as a hint to avoid returning data change files after

            endingVersion. This is not enforcement. Hence, when sending the endingVersion

            parameter, the client should still handle the case that it may receive files

            after endingVersion.

            '
