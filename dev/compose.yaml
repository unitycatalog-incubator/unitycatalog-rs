# Available profiles:
# - full: run all services including unity catalog

networks:
  sharing:

services:
  uc:
    image: unitycatalog-rs:dev
    container_name: uc
    hostname: uc
    profiles: ["full"]
    restart: always
    networks:
      - sharing
    ports:
      - "8080:8080"
    command: ["server", "--rest", "--use-db"]
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/postgres
    depends_on:
      - azurite_uc_dev
      - postgres_uc_dev

  azurite_uc_dev:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: azurite
    hostname: azurite
    profiles: ["azurite", "full"]
    restart: always
    networks:
      - sharing
    ports:
      - "10000:10000"
      # - "10001:10001"
      # - "10002:10002"

  postgres_uc_dev:
    image: postgres:16
    container_name: postgres_uc_dev
    hostname: postgres
    networks:
      - sharing
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # SeaweedFS: S3-compatible object storage emulator for local AWS credential testing.
  # Note: SeaweedFS STS AssumeRole has a known SigV4 compatibility issue with session tokens.
  # Use static credentials (WEED_S3_ACCESS_KEY / WEED_S3_SECRET_KEY) for local tests.
  # For full STS round-trip testing, use real AWS or LocalStack.
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: seaweedfs
    hostname: seaweedfs
    profiles: ["seaweedfs", "full"]
    restart: always
    networks:
      - sharing
    ports:
      - "9333:9333" # master
      - "8333:8333" # S3 API
    command: "server -s3 -s3.port=8333 -master.volumeSizeLimitMB=100"
    environment:
      - WEED_S3_ACCESS_KEY=weedadmin
      - WEED_S3_SECRET_KEY=weedpassword

  seaweedfs_init:
    image: amazon/aws-cli
    container_name: seaweedfs_init
    profiles: ["seaweedfs", "full"]
    depends_on:
      - seaweedfs
    networks:
      - sharing
    environment:
      - AWS_ACCESS_KEY_ID=weedadmin
      - AWS_SECRET_ACCESS_KEY=weedpassword
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "until aws --endpoint-url http://seaweedfs:8333 s3 ls 2>/dev/null; do
         echo 'Waiting for SeaweedFS...' && sleep 2;
       done;
       aws --endpoint-url http://seaweedfs:8333 s3 mb s3://test-bucket || true;
       exit 0;"
