[project]
name = "unitycatalog-py"
version = "0.0.1"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "datamodel-code-generator>=0.28.5",
  "marimo[recommended]>=0.14.17",
  "maturin>=1.8.3",
  "pydantic>=2.11.1, <3",
  # "unitycatalog-client",
  "requests>=2.32.3",
]

# [tool.uv.sources]
# unitycatalog-client = { workspace = true }

[tool.uv.workspace]
members = ["python/*", "examples/python"]

[tool.pyright]
venvPath = "."
venv = ".venv"

[tool.ruff]
line-length = 100
# `_client.pyi` is auto-generated by trestle and the recipe in
# `just generate-code` splices in a hand-written supplement. Skip
# linting it entirely so ruff doesn't churn the canonical codegen
# output (Optional / Union / Dict / List forms) on every run.
extend-exclude = ["python/client/python/unitycatalog_client/_client.pyi"]

[tool.ruff.lint]
extend-select = [
  "UP",  # pyupgrade
  # "D",   # pydocstyle
]

[tool.ruff.lint.per-file-ignores]
# `_client_supplement.pyi` is a hand-written stub *fragment* appended
# to the codegen-emitted `_client.pyi` by `just generate-code`. It
# references names (e.g. `TemporaryCredential`) declared earlier in
# the merged file, so it can't fully resolve in isolation.
"python/client/_client_supplement.pyi" = ["F821"]

[tool.ruff.lint.pydocstyle]
convention = "google"
