version: v2
managed:
  enabled: true
  disable:
    # Disables all go_package changes for this module only
    - file_option: go_package
      module: buf.build/googleapis/googleapis
plugins:
  - remote: buf.build/community/neoeinstein-prost:v0.5.0
    out: crates/sharing-client/src/models/gen
    opt:
      # - bytes=.
      - compile_well_known_types=true
      - file_descriptor_set=false
      # Flat `<package>.rs` filenames (v0.5.0 defaults to a nested tree); the
      # generated `_gen/mod.rs` `include!`s the flat layout.
      - flat_output_dir=true
  - remote: buf.build/community/neoeinstein-prost-serde:v0.4.0
    out: crates/sharing-client/src/models/gen
    opt:
      # useful to build reusable extractors for axum
      - ignore_unknown_fields=true
      - preserve_proto_field_names=true
      - flat_output_dir=true
  - remote: buf.build/bufbuild/es:v2.12.1
    out: node/client/unitycatalog/models/gen
    opt:
      - target=ts
      - json_types=false
