syntax = "proto3";

package open_sharing.v1;

import "buf/validate/validate.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "open_sharing/v1/assets.proto";

// List the agent skills in a schema.
message ListSkillsRequest {
  // The share name to query. It's case-insensitive.
  string share = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z._]*[0-9a-z]$",
    (google.api.field_behavior) = REQUIRED
  ];

  // The schema name to query. It's case-insensitive.
  string schema = 2 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z._]*[0-9a-z]$",
    (google.api.field_behavior) = REQUIRED
  ];

  // The maximum number of results per page that should be returned.
  optional int32 max_results = 3 [
    (buf.validate.field).int32.gt = 0,
    (buf.validate.field).int32.lt = 1000,
    (google.api.field_behavior) = OPTIONAL
  ];

  // Specifies a page token to use, from a previous response's next_page_token.
  optional string page_token = 4 [(google.api.field_behavior) = OPTIONAL];
}

// Response for ListSkillsRequest.
message ListSkillsResponse {
  // The skills that were requested.
  repeated SharingSkill items = 1;

  // Token that can be used to retrieve the next page of skills.
  optional string next_page_token = 2;
}

// List all the agent skills under a share, across all schemas.
message ListAllSkillsRequest {
  // The share name to query. It's case-insensitive.
  string share = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z._]*[0-9a-z]$",
    (google.api.field_behavior) = REQUIRED
  ];

  // The maximum number of results per page that should be returned.
  optional int32 max_results = 2 [
    (buf.validate.field).int32.gt = 0,
    (buf.validate.field).int32.lt = 1000,
    (google.api.field_behavior) = OPTIONAL
  ];

  // Specifies a page token to use, from a previous response's next_page_token.
  optional string page_token = 3 [(google.api.field_behavior) = OPTIONAL];
}

// Response for ListAllSkillsRequest.
message ListAllSkillsResponse {
  // The skills that were requested.
  repeated SharingSkill items = 1;

  // Token that can be used to retrieve the next page of skills.
  optional string next_page_token = 2;
}

// Get a single agent skill by name.
message GetSkillRequest {
  // The share name to query. It's case-insensitive.
  string share = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z._]*[0-9a-z]$",
    (google.api.field_behavior) = REQUIRED
  ];

  // The schema name to query. It's case-insensitive.
  string schema = 2 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z._]*[0-9a-z]$",
    (google.api.field_behavior) = REQUIRED
  ];

  // The skill name to query. It's case-insensitive.
  string name = 3 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z._]*[0-9a-z]$",
    (google.api.field_behavior) = REQUIRED
  ];
}

// Request temporary credentials scoped to a shared skill's storage location.
message GenerateTemporarySkillCredentialsRequest {
  // The share name. It's case-insensitive.
  string share = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z._]*[0-9a-z]$",
    (google.api.field_behavior) = REQUIRED
  ];

  // The schema name. It's case-insensitive.
  string schema = 2 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z._]*[0-9a-z]$",
    (google.api.field_behavior) = REQUIRED
  ];

  // The skill name. It's case-insensitive.
  string name = 3 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z._]*[0-9a-z]$",
    (google.api.field_behavior) = REQUIRED
  ];
}

// Open Sharing agent-skill APIs: discovery and credential vending for shared
// storage-backed agent skills.
service SharingSkillService {
  // List the agent skills in a given share's schema.
  rpc ListSkills(ListSkillsRequest) returns (ListSkillsResponse) {
    option (google.api.http) = {get: "/shares/{share}/schemas/{schema}/skills"};
    option (gnostic.openapi.v3.operation) = {operation_id: "ListSkills"};
  }

  // List all the agent skills under a share, across all schemas.
  rpc ListAllSkills(ListAllSkillsRequest) returns (ListAllSkillsResponse) {
    option (google.api.http) = {get: "/shares/{share}/all-skills"};
    option (gnostic.openapi.v3.operation) = {operation_id: "ListAllSkills"};
  }

  // Get the metadata for a single shared agent skill.
  rpc GetSkill(GetSkillRequest) returns (SharingSkill) {
    option (google.api.http) = {get: "/shares/{share}/schemas/{schema}/skills/{name}"};
    option (gnostic.openapi.v3.operation) = {operation_id: "GetSkill"};
  }

  // Generate temporary credentials scoped to a shared skill's storage
  // location, for direct file access via the cloud storage API.
  rpc GenerateTemporarySkillCredentials(GenerateTemporarySkillCredentialsRequest) returns (SharingTemporaryCredentials) {
    option (google.api.http) = {
      post: "/shares/{share}/schemas/{schema}/skills/{name}/temporary-skill-credentials"
      body: "*"
    };
    option (gnostic.openapi.v3.operation) = {operation_id: "GenerateTemporarySkillCredentials"};
  }
}
