syntax = "proto3";

package open_sharing.v1;

import "buf/validate/validate.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "open_sharing/v1/assets.proto";

// List the volumes in a schema.
message ListVolumesRequest {
  // The share name to query. It's case-insensitive.
  string share = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z._]*[0-9a-z]$",
    (google.api.field_behavior) = REQUIRED
  ];

  // The schema name to query. It's case-insensitive.
  string schema = 2 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z._]*[0-9a-z]$",
    (google.api.field_behavior) = REQUIRED
  ];

  // The maximum number of results per page that should be returned.
  optional int32 max_results = 3 [
    (buf.validate.field).int32.gt = 0,
    (buf.validate.field).int32.lt = 1000,
    (google.api.field_behavior) = OPTIONAL
  ];

  // Specifies a page token to use, from a previous response's next_page_token.
  optional string page_token = 4 [(google.api.field_behavior) = OPTIONAL];
}

// Response for ListVolumesRequest.
message ListVolumesResponse {
  // The volumes that were requested.
  repeated SharingVolume items = 1;

  // Token that can be used to retrieve the next page of volumes.
  optional string next_page_token = 2;
}

// List all the volumes under a share, across all schemas.
message ListAllVolumesRequest {
  // The share name to query. It's case-insensitive.
  string share = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z._]*[0-9a-z]$",
    (google.api.field_behavior) = REQUIRED
  ];

  // The maximum number of results per page that should be returned.
  optional int32 max_results = 2 [
    (buf.validate.field).int32.gt = 0,
    (buf.validate.field).int32.lt = 1000,
    (google.api.field_behavior) = OPTIONAL
  ];

  // Specifies a page token to use, from a previous response's next_page_token.
  optional string page_token = 3 [(google.api.field_behavior) = OPTIONAL];
}

// Response for ListAllVolumesRequest.
message ListAllVolumesResponse {
  // The volumes that were requested.
  repeated SharingVolume items = 1;

  // Token that can be used to retrieve the next page of volumes.
  optional string next_page_token = 2;
}

// Get a single volume by name.
message GetVolumeRequest {
  // The share name to query. It's case-insensitive.
  string share = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z._]*[0-9a-z]$",
    (google.api.field_behavior) = REQUIRED
  ];

  // The schema name to query. It's case-insensitive.
  string schema = 2 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z._]*[0-9a-z]$",
    (google.api.field_behavior) = REQUIRED
  ];

  // The volume name to query. It's case-insensitive.
  string name = 3 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z._]*[0-9a-z]$",
    (google.api.field_behavior) = REQUIRED
  ];
}

// Request temporary credentials scoped to a shared volume's storage location.
message GenerateTemporaryVolumeCredentialsRequest {
  // The share name. It's case-insensitive.
  string share = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z._]*[0-9a-z]$",
    (google.api.field_behavior) = REQUIRED
  ];

  // The schema name. It's case-insensitive.
  string schema = 2 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z._]*[0-9a-z]$",
    (google.api.field_behavior) = REQUIRED
  ];

  // The volume name. It's case-insensitive.
  string name = 3 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z._]*[0-9a-z]$",
    (google.api.field_behavior) = REQUIRED
  ];
}

// Open Sharing volume APIs: discovery and credential vending for shared
// storage-backed volumes.
service SharingVolumeService {
  // List the volumes in a given share's schema.
  rpc ListVolumes(ListVolumesRequest) returns (ListVolumesResponse) {
    option (google.api.http) = {get: "/shares/{share}/schemas/{schema}/volumes"};
    option (gnostic.openapi.v3.operation) = {operation_id: "ListVolumes"};
  }

  // List all the volumes under a share, across all schemas.
  rpc ListAllVolumes(ListAllVolumesRequest) returns (ListAllVolumesResponse) {
    option (google.api.http) = {get: "/shares/{share}/all-volumes"};
    option (gnostic.openapi.v3.operation) = {operation_id: "ListAllVolumes"};
  }

  // Get the metadata for a single shared volume.
  rpc GetVolume(GetVolumeRequest) returns (SharingVolume) {
    option (google.api.http) = {get: "/shares/{share}/schemas/{schema}/volumes/{name}"};
    option (gnostic.openapi.v3.operation) = {operation_id: "GetVolume"};
  }

  // Generate temporary credentials scoped to a shared volume's storage
  // location, for direct file access via the cloud storage API.
  rpc GenerateTemporaryVolumeCredentials(GenerateTemporaryVolumeCredentialsRequest) returns (SharingTemporaryCredentials) {
    option (google.api.http) = {
      post: "/shares/{share}/schemas/{schema}/volumes/{name}/temporary-volume-credentials"
      body: "*"
    };
    option (gnostic.openapi.v3.operation) = {operation_id: "GenerateTemporaryVolumeCredentials"};
  }
}
