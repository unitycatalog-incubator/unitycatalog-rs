syntax = "proto3";

package open_sharing.v1;

import "buf/validate/validate.proto";
import "open_sharing/v1/models.proto";
import "open_sharing/v1/query.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";

option (gnostic.openapi.v3.document) = {
  info: {
    title: "Open Sharing API"
    version: "1.0.0"
    description: "An Open Protocol for Secure Data Sharing. Extends the Delta Sharing protocol; the tabular surface remains wire-compatible with Delta Sharing clients."
    license: {
      name: "Apache 2.0"
      url: "https://www.apache.org/licenses/LICENSE-2.0.html"
    }
  }
  servers: [
    {
      url: "{scheme}://{host}/"
      // variables: {
      //   scheme: {
      //     description: "The scheme of the URI, either http or https."
      //     default: "http"
      //   }
      //   host: {
      //     description: "The host address for the specified server."
      //     default: "localhost"
      //   }
      // }
    }
  ]
};

// Request to list shares.
message ListSharesRequest {
  // The maximum number of results per page that should be returned.
  optional int32 max_results = 1 [
    (buf.validate.field).int32.gt = 0,
    (buf.validate.field).int32.lt = 1000,
    (google.api.field_behavior) = OPTIONAL
  ];

  // Specifies a page token to use. Set pageToken to the nextPageToken returned
  // by a previous list request to get the next page of results.
  optional string page_token = 2 [(google.api.field_behavior) = OPTIONAL];
}

// Response for ListSharesRequest.
message ListSharesResponse {
  // The shares that were requested.
  repeated Share items = 1;

  // Token that can be used to retrieve the next page of shares.
  // An empty or missing token means that no more shares are available for retrieval.
  optional string next_page_token = 2;
}

// Get a share by name.
message GetShareRequest {
  // The share name to query. It's case-insensitive.
  string name = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z._]*[0-9a-z]$",
    (google.api.field_behavior) = REQUIRED
  ];
}

// List schemas in a share.
message ListSchemasRequest {
  // The share name to query. It's case-insensitive.
  string share = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z._]*[0-9a-z]$",
    (google.api.field_behavior) = REQUIRED
  ];

  // The maximum number of results per page that should be returned.
  optional int32 max_results = 2 [
    (buf.validate.field).int32.gt = 0,
    (buf.validate.field).int32.lt = 1000,
    (google.api.field_behavior) = OPTIONAL
  ];

  // Specifies a page token to use. Set pageToken to the nextPageToken returned
  // by a previous list request to get the next page of results.
  optional string page_token = 3 [(google.api.field_behavior) = OPTIONAL];
}

// Response for ListSchemasRequest.
message ListSchemasResponse {
  // The schemas that were requested.
  repeated Schema items = 1;

  // Token that can be used to retrieve the next page of schemas.
  // An empty or missing token means that no more schemas are available for retrieval.
  optional string next_page_token = 2;
}

// List tables in a schema.
message ListTablesRequest {
  // The schema name to query. It's case-insensitive.
  string name = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z._]*[0-9a-z]$",
    (google.api.field_behavior) = REQUIRED
  ];

  // The share name to query. It's case-insensitive.
  string share = 2 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z._]*[0-9a-z]$",
    (google.api.field_behavior) = REQUIRED
  ];

  // The maximum number of results per page that should be returned.
  optional int32 max_results = 3 [
    (buf.validate.field).int32.gt = 0,
    (buf.validate.field).int32.lt = 1000,
    (google.api.field_behavior) = OPTIONAL
  ];

  // Specifies a page token to use. Set pageToken to the nextPageToken returned
  // by a previous list request to get the next page of results.
  optional string page_token = 4 [(google.api.field_behavior) = OPTIONAL];
}

// Response for ListTablesRequest.
message ListTablesResponse {
  // The tables that were requested.
  repeated Table items = 1;
  // Token that can be used to retrieve the next page of tables.
  // An empty or missing token means that no more tables are available for retrieval.
  optional string next_page_token = 2;
}

// List tables in a share.
message ListAllTablesRequest {
  // The share name to query. It's case-insensitive.
  string name = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z._]*[0-9a-z]$",
    (google.api.field_behavior) = REQUIRED
  ];

  // The maximum number of results per page that should be returned.
  optional int32 max_results = 2 [
    (buf.validate.field).int32.gt = 0,
    (buf.validate.field).int32.lt = 1000,
    (google.api.field_behavior) = OPTIONAL
  ];

  // Specifies a page token to use. Set pageToken to the nextPageToken returned
  // by a previous list request to get the next page of results.
  optional string page_token = 3 [(google.api.field_behavior) = OPTIONAL];
}

// Request to query the data files of a table.
message QueryTableRequest {
  // The share name that contains the table. It's case-insensitive.
  string share = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z._]*[0-9a-z]$",
    (google.api.field_behavior) = REQUIRED
  ];

  // The schema name that contains the table. It's case-insensitive.
  string schema = 2 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z._]*[0-9a-z]$",
    (google.api.field_behavior) = REQUIRED
  ];

  // The table name to query. It's case-insensitive.
  string name = 3 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z._]*[0-9a-z]$",
    (google.api.field_behavior) = REQUIRED
  ];

  // The starting timestamp to query from, an ISO8601 string in the UTC timezone
  // (for example `2022-01-01T00:00:00Z`).
  optional string starting_timestamp = 4 [(google.api.field_behavior) = OPTIONAL];

  // SQL-like predicate hints on the partition columns; the server may use these
  // to prune files. Hints are best-effort and must not affect correctness.
  repeated string predicate_hints = 5 [(google.api.field_behavior) = OPTIONAL];

  // Structured predicate, applied to partition columns, used to prune files.
  // Best-effort; must not affect correctness.
  optional JsonPredicate json_predicate_hints = 6 [(google.api.field_behavior) = OPTIONAL];

  // A hint on the maximum number of rows the client intends to read; the server
  // may use it to limit the number of files returned. Best-effort.
  optional int32 limit_hint = 7 [(google.api.field_behavior) = OPTIONAL];

  // Query the table at this specific Delta version (snapshot query).
  optional int64 version = 8 [(google.api.field_behavior) = OPTIONAL];

  // Query the table as of this timestamp, an ISO8601 string in the UTC timezone.
  optional string timestamp = 9 [(google.api.field_behavior) = OPTIONAL];

  // The starting version (inclusive) for a change-data-feed query.
  optional int64 starting_version = 10 [(google.api.field_behavior) = OPTIONAL];

  // The ending version (inclusive) for a change-data-feed query.
  optional int64 ending_version = 11 [(google.api.field_behavior) = OPTIONAL];
}

// Response for ListAllTablesRequest.
message ListAllTablesResponse {
  // The tables that were requested.
  repeated Table items = 1;

  // Token that can be used to retrieve the next page of tables.
  // An empty or missing token means that no more tables are available for retrieval.
  optional string next_page_token = 2;
}

// Service exposing the official APIs for Delta Sharing.
service SharingService {
  // List shares accessible to a recipient.
  rpc ListShares(ListSharesRequest) returns (ListSharesResponse) {
    option (google.api.http) = {get: "/shares"};
    option (gnostic.openapi.v3.operation) = {operation_id: "ListShares"};
  }

  // Get the metadata for a specific share.
  rpc GetShare(GetShareRequest) returns (Share) {
    option (google.api.http) = {get: "/shares/{name}"};
    option (gnostic.openapi.v3.operation) = {operation_id: "GetShare"};
  }

  // List the schemas in a share.
  rpc ListSchemas(ListSchemasRequest) returns (ListSchemasResponse) {
    option (google.api.http) = {get: "/shares/{share}/schemas"};
    option (gnostic.openapi.v3.operation) = {operation_id: "ListSchemas"};
  }

  // List the tables in a given share's schema.
  rpc ListTables(ListTablesRequest) returns (ListTablesResponse) {
    option (google.api.http) = {get: "/shares/{share}/schemas/{name}/tables"};
    option (gnostic.openapi.v3.operation) = {operation_id: "ListTables"};
  }

  // List all the tables under a share.
  //
  // A convenience over per-schema listing: returns every table across all
  // schemas in the share.
  rpc ListAllTables(ListAllTablesRequest) returns (ListAllTablesResponse) {
    option (google.api.http) = {get: "/shares/{name}/all-tables"};
    option (gnostic.openapi.v3.operation) = {operation_id: "ListAllTables"};
  }

  // NOTE: The table query path — GetTableVersion, GetTableMetadata, and
  // QueryTable — is intentionally NOT part of this service definition. Those
  // endpoints return newline-delimited JSON (`application/x-ndjson`) with the
  // `Delta-Table-Version` / `delta-sharing-capabilities` response headers, a
  // streaming contract the JSON-oriented code generator does not model. They
  // are implemented by hand (see `server/src/services/sharing.rs` and the
  // `rest/routers/sharing.rs` router). Their request/response messages remain
  // defined below for that hand-written implementation to use.
}
