syntax = "proto3";

package unitycatalog.temporary_credentials.v1;

import "buf/validate/validate.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "unitycatalog/temporary_credentials/v1/models.proto";

// Generate a new set of credentials for a table.
message GenerateTemporaryTableCredentialsRequest {
  enum Operation {
    // The operation is not specified.
    UNSPECIFIED = 0;

    // The operation is read only.
    READ = 1;

    // The operation is read and write.
    READ_WRITE = 2;
  }

  // UUID of the table to read or write.
  string table_id = 1 [(google.api.field_behavior) = REQUIRED];

  // The operation performed against the table data, either READ or READ_WRITE.
  // If READ_WRITE is specified, the credentials returned will have write
  // permissions, otherwise, it will be read only.
  Operation operation = 2 [(google.api.field_behavior) = REQUIRED];
}

// Generate a new set of credentials for a path.
message GenerateTemporaryPathCredentialsRequest {
  enum Operation {
    // The operation is not specified.
    UNSPECIFIED = 0;

    // The operation is read only.
    PATH_READ = 1;

    // The operation is read and write.
    PATH_READ_WRITE = 2;

    // The operation creates a table at the path.
    PATH_CREATE_TABLE = 3;
  }

  // URL for path-based access.
  string url = 1 [(google.api.field_behavior) = REQUIRED];

  // The operation being performed on the path.
  Operation operation = 2 [(google.api.field_behavior) = REQUIRED];

  // When set to true, the service will not validate that the generated
  // credentials can perform write operations, therefore no new paths will be
  // created and the response will not contain valid credentials. Defaults to false.
  optional bool dry_run = 3 [(google.api.field_behavior) = OPTIONAL];
}

// Service for generating temporary credentials to access tables and storage paths.
// Credentials are short-lived and scoped to a specific operation (read or read/write).
service TemporaryCredentialsService {
  // Generate a new set of credentials for a table.
  rpc GenerateTemporaryTableCredentials(GenerateTemporaryTableCredentialsRequest) returns (TemporaryCredential) {
    option (google.api.http) = {
      post: "/temporary-table-credentials"
      body: "*"
    };
    option (gnostic.openapi.v3.operation) = {operation_id: "GenerateTemporaryTableCredentials"};
  }

  // Generate a new set of credentials for a path.
  rpc GenerateTemporaryPathCredentials(GenerateTemporaryPathCredentialsRequest) returns (TemporaryCredential) {
    option (google.api.http) = {
      post: "/temporary-path-credentials"
      body: "*"
    };
    option (gnostic.openapi.v3.operation) = {operation_id: "GenerateTemporaryPathCredentials"};
  }
}
