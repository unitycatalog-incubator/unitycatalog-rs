syntax = "proto3";

package unitycatalog.volumes.v1;

import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";

enum VolumeType {
  VOLUME_TYPE_UNSPECIFIED = 0;
  VOLUME_TYPE_EXTERNAL = 1;
  VOLUME_TYPE_MANAGED = 2;
}

message Volume {
  option (google.api.resource) = {
    type: "unitycatalog.io/Volume"
    pattern: "volume/{volume}"
    plural: "volumes"
    singular: "volume"
  };

  // Name of volume, relative to parent schema.
  string name = 1 [
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z_]*[0-9a-z]$",
    (buf.validate.field).string.min_len = 3,
    (google.api.field_behavior) = REQUIRED
  ];

  // Name of parent catalog.
  string catalog_name = 2 [
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z_]*[0-9a-z]$",
    (buf.validate.field).string.min_len = 3,
    (google.api.field_behavior) = REQUIRED
  ];

  // Name of parent schema.
  string schema_name = 3 [
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z_]*[0-9a-z]$",
    (buf.validate.field).string.min_len = 3,
    (google.api.field_behavior) = REQUIRED
  ];

  // The three-level (fully qualified) name of the volume
  string full_name = 4 [
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z_]*[0-9a-z]\\.[a-z][0-9a-z_]*[0-9a-z]\\.[a-z][0-9a-z_]*[0-9a-z]$",
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // The storage location on the cloud
  string storage_location = 5 [
    (buf.validate.field).string.uri = true,
    (google.api.field_behavior) = REQUIRED
  ];

  // The unique identifier of the volume
  string volume_id = 6 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.field_behavior) = IDENTIFIER
  ];

  // The type of the volume.
  //
  // An external volume is located in the specified external location.
  // A managed volume is located in the default location which is specified
  // by the parent schema, or the parent catalog, or the Metastore.
  VolumeType volume_type = 7 [(google.api.field_behavior) = REQUIRED];

  // Username of current owner of table.
  optional string owner = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // User-provided free-form text description.
  optional string comment = 9 [(google.api.field_behavior) = OPTIONAL];

  // Time at which this catalog was created, in epoch milliseconds.
  optional int64 created_at = 1000 [
    (buf.validate.field).int64.gt = 0,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Username of catalog creator.
  optional string created_by = 1001 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Time at which this catalog was last updated, in epoch milliseconds.
  optional int64 updated_at = 1002 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Username of user who last modified catalog.
  optional string updated_by = 1003 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Indicates whether the principal is limited to retrieving metadata
  // for the associated object through the BROWSE privilege when include_browse
  // is enabled in the request.
  optional bool browse_only = 1004 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The unique identifier of the metastore
  optional string metastore_id = 1005 [(google.api.field_behavior) = OUTPUT_ONLY];
}
