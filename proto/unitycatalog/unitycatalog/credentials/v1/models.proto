syntax = "proto3";

package unitycatalog.credentials.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/struct.proto";

// The Azure service principal configuration.
message AzureServicePrincipal {
  // The directory ID corresponding to the Azure Active Directory (AAD) tenant of the application.
  string directory_id = 1 [(google.api.field_behavior) = REQUIRED];

  // The application ID of the application registration within the referenced AAD tenant.
  string application_id = 2 [(google.api.field_behavior) = REQUIRED];

  oneof credential {
    option (buf.validate.oneof).required = true;

    // The client secret generated for the above app ID in AAD.
    string client_secret = 3;

    // Location of the file containing a federated token.
    //
    // Specifically useful for workload identity federation.
    string federated_token_file = 5;
  }
}

// The Azure managed identity configuration.
message AzureManagedIdentity {
  // The Azure resource ID of the Azure Databricks Access Connector.
  // Use the format /subscriptions/{guid}/resourceGroups/{rg-name}/providers/
  // Microsoft.Databricks/accessConnectors/{connector-name}.
  string access_connector_id = 1 [(google.api.field_behavior) = REQUIRED];

  // The Databricks internal ID that represents this managed identity.
  optional string credential_id = 2 [(google.api.field_behavior) = OPTIONAL];

  // The Azure resource ID of the managed identity.
  // Use the format /subscriptions/{guid}/resourceGroups/{rg-name}/providers/
  // Microsoft.ManagedIdentity/userAssignedIdentities/{identity-name}.
  // This is only available for user-assigned identities. For system-assigned
  // identities, the access_connector_id is used to identify the identity.
  // If this field is not provided, then the system-assigned identity of the
  // Access Connector is used.
  optional string managed_identity_id = 3 [(google.api.field_behavior) = OPTIONAL];
}

// The Azure storage key configuration.
message AzureStorageKey {
  // The name of the storage account.
  string account_name = 1 [(google.api.field_behavior) = REQUIRED];

  // The account key of the storage account.
  string account_key = 2 [(google.api.field_behavior) = REQUIRED];
}

// The AWS IAM role configuration used server-side to call STS AssumeRole.
//
// This is an internal configuration type, not exposed in the public API response.
// It stores the static credentials (or ambient credential fallback) used to
// authorize the STS:AssumeRole call when vending temporary credentials.
message AwsIamRoleConfig {
  // The Amazon Resource Name (ARN) of the AWS IAM role used to vend temporary credentials.
  string role_arn = 1 [(google.api.field_behavior) = REQUIRED];

  // The AWS region where STS calls are made. Defaults to "us-east-1" if absent.
  optional string region = 2 [(google.api.field_behavior) = OPTIONAL];

  // AWS access key ID used to authorize the STS AssumeRole call.
  //
  // When set together with secret_access_key, these static credentials are used
  // as the base identity to call STS:AssumeRole. When omitted, the server falls
  // back to ambient credentials (instance profile, ECS task role, WebIdentity, etc.).
  optional string access_key_id = 3 [(google.api.field_behavior) = OPTIONAL];

  // AWS secret access key paired with access_key_id.
  optional string secret_access_key = 4 [(google.api.field_behavior) = OPTIONAL];

  // Optional AWS session token for temporary base credentials (e.g. when the
  // caller itself holds STS-vended credentials as the base identity).
  optional string session_token = 5 [(google.api.field_behavior) = OPTIONAL];
}

// The AWS IAM role configuration returned in credential responses.
message AwsIamRole {
  // The external ID used in role assumption to prevent the confused deputy problem.
  string external_id = 1 [(google.api.field_behavior) = REQUIRED];

  // The Amazon Resource Name (ARN) of the AWS IAM role used to vend temporary credentials.
  string role_arn = 2 [(google.api.field_behavior) = REQUIRED];

  // The Amazon Resource Name (ARN) of the AWS IAM user managed by Databricks.
  // This is the identity that is going to assume the AWS IAM role.
  string unity_catalog_iam_arn = 3 [(google.api.field_behavior) = REQUIRED];
}

// The Databricks managed GCP service account configuration.
message DatabricksGcpServiceAccount {
  // The Databricks internal ID that represents this managed identity.
  optional string credential_id = 1 [(google.api.field_behavior) = OPTIONAL];

  // The email of the service account.
  optional string email = 2 [(google.api.field_behavior) = OPTIONAL];

  // The ID that represents the private key for this Service Account.
  optional string private_key_id = 3 [(google.api.field_behavior) = OPTIONAL];
}

// The purpose of a credential.
enum Purpose {
  PURPOSE_UNSPECIFIED = 0;

  // The credential is used to access external storage locations.
  STORAGE = 1;

  // The credential is used to access external services.
  SERVICE = 2;
}

// A credential used to access external data sources or services.
message Credential {
  option (google.api.resource) = {
    type: "unitycatalog.io/Credential"
    pattern: "credentials/{credential}"
    plural: "credentials"
    singular: "credential"
  };
  option (buf.validate.message).oneof = {
    fields: [
      "azure_service_principal",
      "azure_managed_identity",
      "azure_storage_key",
      "aws_iam_role",
      "databricks_gcp_service_account"
    ]
    required: true
  };

  // The credential name.
  //
  // The name must be unique among storage and service credentials within the metastore.
  string name = 1 [(google.api.field_behavior) = REQUIRED];

  // The unique identifier of the credential.
  optional string id = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Indicates the purpose of the credential.
  Purpose purpose = 3 [(google.api.field_behavior) = REQUIRED];

  // Whether the credential is usable only for read operations.
  //
  // Only applicable when purpose is STORAGE.
  bool read_only = 4 [(google.api.field_behavior) = OPTIONAL];

  // Comment associated with the credential.
  optional string comment = 5 [(google.api.field_behavior) = OPTIONAL];

  // Username of current owner of credential.
  optional string owner = 6 [(google.api.field_behavior) = OPTIONAL];

  // Time at which this credential was created, in epoch milliseconds.
  optional int64 created_at = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Username of credential creator.
  optional string created_by = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Time at which this credential was last modified, in epoch milliseconds.
  optional int64 updated_at = 9 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Username of user who last modified the credential.
  optional string updated_by = 10 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Whether this credential is the current metastore's root storage credential.
  //
  // Only applicable when purpose is STORAGE.
  bool used_for_managed_storage = 11 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The full name of the credential.
  optional string full_name = 12 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The Azure service principal configuration.
  optional AzureServicePrincipal azure_service_principal = 100;

  // The Azure managed identity configuration.
  optional AzureManagedIdentity azure_managed_identity = 101;

  // The Azure storage key configuration.
  optional AzureStorageKey azure_storage_key = 102;

  // The AWS IAM role configuration.
  optional AwsIamRoleConfig aws_iam_role = 103;

  // The Databricks managed GCP service account configuration.
  optional DatabricksGcpServiceAccount databricks_gcp_service_account = 104;
}
