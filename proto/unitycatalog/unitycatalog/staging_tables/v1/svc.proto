syntax = "proto3";

package unitycatalog.staging_tables.v1;

import "buf/validate/validate.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "unitycatalog/staging_tables/v1/models.proto";

// Create a new staging table.
message CreateStagingTableRequest {
  // Name of the staging table, relative to the parent schema.
  string name = 1 [
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z_]*[0-9a-z]$",
    (buf.validate.field).string.min_len = 3,
    (google.api.field_behavior) = REQUIRED
  ];

  // Name of the parent catalog.
  string catalog_name = 2 [
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z_]*[0-9a-z]$",
    (buf.validate.field).string.min_len = 3,
    (google.api.field_behavior) = REQUIRED
  ];

  // Name of the parent schema relative to its parent catalog.
  string schema_name = 3 [
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z_]*[0-9a-z]$",
    (buf.validate.field).string.min_len = 3,
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "unitycatalog.io/StagingTable"}
  ];
}

// A staging table reserves an id and storage location for a Unity Catalog
// managed table. After creating one, the client writes the initial Delta commit
// at the returned staging_location and finalizes the table via CreateTable.
service StagingTablesService {
  // Creates a new staging table, allocating an immutable table id and a storage
  // location under the parent schema/catalog managed storage root. The caller
  // must have the CREATE privilege on the parent schema.
  rpc CreateStagingTable(CreateStagingTableRequest) returns (StagingTable) {
    option (google.api.http) = {
      post: "/staging-tables"
      body: "*"
    };
    option (gnostic.openapi.v3.operation) = {operation_id: "CreateStagingTable"};
  }
}
