syntax = "proto3";

package unitycatalog.agents.v0alpha1;

import "buf/validate/validate.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/empty.proto";
import "unitycatalog/agents/v0alpha1/models.proto";

// List agents.
message ListAgentsRequest {
  // The identifier of the catalog.
  string catalog_name = 1 [
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z_]*[0-9a-z]$",
    (buf.validate.field).string.min_len = 3,
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "unitycatalog.io/Agent"}
  ];

  // The identifier of the schema.
  string schema_name = 2 [
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z_]*[0-9a-z]$",
    (buf.validate.field).string.min_len = 3,
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "unitycatalog.io/Agent"}
  ];

  // The maximum number of results per page that should be returned.
  optional int32 max_results = 3 [
    (buf.validate.field).int32.gt = 0,
    (buf.validate.field).int32.lt = 1000,
    (google.api.field_behavior) = OPTIONAL
  ];

  // Opaque pagination token to go to next page based on previous query.
  optional string page_token = 4 [(google.api.field_behavior) = OPTIONAL];

  // Whether to include agents in the response for which the principal can only
  // access selective metadata for.
  optional bool include_browse = 5 [(google.api.field_behavior) = OPTIONAL];
}

// List agents response.
message ListAgentsResponse {
  // The agents returned.
  repeated Agent agents = 1;

  // Opaque token to retrieve the next page of results.
  //
  // Absent if there are no more pages. page_token should be set to
  // this value for the next request to retrieve the next page of results.
  optional string next_page_token = 2;
}

// Create a new agent.
message CreateAgentRequest {
  // The identifier of the catalog.
  string catalog_name = 1 [
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z_]*[0-9a-z]$",
    (buf.validate.field).string.min_len = 3,
    (google.api.field_behavior) = REQUIRED
  ];

  // The identifier of the schema.
  string schema_name = 2 [
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z_]*[0-9a-z]$",
    (buf.validate.field).string.min_len = 3,
    (google.api.field_behavior) = REQUIRED
  ];

  // The identifier of the agent.
  string name = 3 [
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z_]*[0-9a-z]$",
    (buf.validate.field).string.min_len = 3,
    (google.api.field_behavior) = REQUIRED
  ];

  // The protocol a recipient uses to invoke the agent.
  InvocationProtocol invocation_protocol = 4 [(google.api.field_behavior) = REQUIRED];

  // The agent's invocation endpoint URL.
  string endpoint = 5 [
    (buf.validate.field).string.uri = true,
    (google.api.field_behavior) = REQUIRED
  ];

  // An LLM-readable description of what the agent does and the inputs it expects.
  optional string description = 6 [
    (buf.validate.field).string.max_len = 65536,
    (google.api.field_behavior) = OPTIONAL
  ];

  // Capability identifiers advertised by the agent.
  repeated string capabilities = 7 [(google.api.field_behavior) = OPTIONAL];

  // A JSON Schema (encoded as a JSON string) describing the expected input.
  optional string input_schema = 8 [(google.api.field_behavior) = OPTIONAL];

  // User-provided free-form text description.
  optional string comment = 9 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 65536,
    (google.api.field_behavior) = OPTIONAL
  ];
}

message GetAgentRequest {
  // The three-level (fully qualified) name of the agent.
  string name = 1 [
    (buf.validate.field).string.min_len = 3,
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "unitycatalog.io/Agent"}
  ];

  // Whether to include agents in the response for which the principal can only
  // access selective metadata for.
  optional bool include_browse = 1005 [(google.api.field_behavior) = OPTIONAL];
}

message UpdateAgentRequest {
  // The three-level (fully qualified) name of the agent.
  string name = 1 [
    (buf.validate.field).string.min_len = 3,
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "unitycatalog.io/Agent"}
  ];

  // New name for the agent.
  optional string new_name = 2 [
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z_]*[0-9a-z]$",
    (buf.validate.field).string.min_len = 3,
    (google.api.field_behavior) = OPTIONAL
  ];

  // The protocol a recipient uses to invoke the agent.
  optional InvocationProtocol invocation_protocol = 3 [(google.api.field_behavior) = OPTIONAL];

  // The agent's invocation endpoint URL.
  optional string endpoint = 4 [
    (buf.validate.field).string.uri = true,
    (google.api.field_behavior) = OPTIONAL
  ];

  // Updated LLM-readable description.
  optional string description = 5 [
    (buf.validate.field).string.max_len = 65536,
    (google.api.field_behavior) = OPTIONAL
  ];

  // Updated capability identifiers advertised by the agent.
  repeated string capabilities = 6 [(google.api.field_behavior) = OPTIONAL];

  // Updated JSON Schema (encoded as a JSON string) describing the expected input.
  optional string input_schema = 7 [(google.api.field_behavior) = OPTIONAL];

  // The comment attached to the agent.
  optional string comment = 8 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 65536,
    (google.api.field_behavior) = OPTIONAL
  ];

  // The identifier of the user who owns the agent.
  optional string owner = 9 [(google.api.field_behavior) = OPTIONAL];
}

message DeleteAgentRequest {
  // The three-level (fully qualified) name of the agent.
  string name = 1 [
    (buf.validate.field).string.min_len = 3,
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "unitycatalog.io/Agent"}
  ];
}

// Service for managing agents in Unity Catalog.
//
// Agents are remote invocable services (endpoint + invocation protocol) within a
// schema. This is an early-stage (v0alpha1) surface aligned with the Open
// Sharing agent community proposal.
service AgentsService {
  // Lists agents.
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse) {
    option (google.api.http) = {get: "/agents"};
    option (gnostic.openapi.v3.operation) = {operation_id: "ListAgents"};
  }

  rpc CreateAgent(CreateAgentRequest) returns (Agent) {
    option (google.api.http) = {
      post: "/agents"
      body: "*"
    };
    option (gnostic.openapi.v3.operation) = {operation_id: "CreateAgent"};
  }

  rpc GetAgent(GetAgentRequest) returns (Agent) {
    option (google.api.http) = {get: "/agents/{name}"};
    option (gnostic.openapi.v3.operation) = {operation_id: "GetAgent"};
  }

  rpc UpdateAgent(UpdateAgentRequest) returns (Agent) {
    option (google.api.http) = {
      patch: "/agents/{name}"
      body: "*"
    };
    option (gnostic.openapi.v3.operation) = {operation_id: "UpdateAgent"};
  }

  rpc DeleteAgent(DeleteAgentRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/agents/{name}"};
    option (gnostic.openapi.v3.operation) = {operation_id: "DeleteAgent"};
  }
}
