syntax = "proto3";

package unitycatalog.delta_commits.v1;

import "buf/validate/validate.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/empty.proto";
import "unitycatalog/delta_commits/v1/models.proto";

// Request to ratify a Delta commit and/or notify the catalog of backfill.
//
// At least one of `commit_info` or `latest_backfilled_version` must be set.
message CommitRequest {
  // UUID of the catalog-managed table being committed to.
  string table_id = 1 [(google.api.field_behavior) = REQUIRED];

  // The storage URI of the table. Must match the table's registered storage
  // location (normalized) on the commit path.
  string table_uri = 2 [(google.api.field_behavior) = REQUIRED];

  // The commit to ratify. Absent for a backfill-only notification.
  optional CommitInfo commit_info = 3 [(google.api.field_behavior) = OPTIONAL];

  // Notify the catalog that commits up to and including this version have been
  // published (backfilled) to the Delta log. The catalog prunes ratified
  // commits accordingly.
  optional int64 latest_backfilled_version = 4 [(google.api.field_behavior) = OPTIONAL];

  // An optional Delta metadata change accompanying the commit.
  optional Metadata metadata = 5 [(google.api.field_behavior) = OPTIONAL];
}

// Request to read ratified-but-unpublished commits for a table.
message GetCommitsRequest {
  // UUID of the catalog-managed table.
  string table_id = 1 [(google.api.field_behavior) = REQUIRED];

  // The storage URI of the table.
  string table_uri = 2 [(google.api.field_behavior) = REQUIRED];

  // The lowest version to return (inclusive). Defaults to 0.
  int64 start_version = 3 [
    (buf.validate.field).int64.gte = 0,
    (google.api.field_behavior) = REQUIRED
  ];

  // The highest version to return (inclusive). When set, must be
  // `>= start_version`. Defaults to the latest version.
  optional int64 end_version = 4 [(google.api.field_behavior) = OPTIONAL];
}

// Service implementing the Delta catalog-managed commits ("commit coordinator")
// protocol. The catalog is the source of truth for which commit wins each
// version.
service DeltaCommitsService {
  // Ratify a staged commit at the requested version (first-writer-wins), and/or
  // notify the catalog that commits have been backfilled to the Delta log.
  rpc Commit(CommitRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/delta/preview/commits"
      body: "*"
    };
    option (gnostic.openapi.v3.operation) = {operation_id: "Commit"};
  }

  // Return ratified-but-unpublished commits for a table, plus the latest
  // version the catalog tracks.
  rpc GetCommits(GetCommitsRequest) returns (GetCommitsResponse) {
    option (google.api.http) = {get: "/delta/preview/commits"};
    option (gnostic.openapi.v3.operation) = {operation_id: "GetCommits"};
  }
}
