name: node-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  SCCACHE_GHA_ENABLED: true
  RUSTC_WRAPPER: sccache

jobs:
  node-unit-tests:
    name: node-unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          rustflags: ""

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: node/client

      - name: Build NAPI binding
        # Regenerate the TypeScript declarations (`--dts`) so a stale committed
        # `native.d.ts` cannot silently break `tsc` when the Rust NAPI surface
        # changes; the type definitions are always rebuilt from the binding.
        run: npx napi build --platform --release --dts unitycatalog/native.d.ts
        working-directory: node/client

      - name: Compile TypeScript
        run: npm run tsc
        working-directory: node/client

      - name: Copy .node artifact to dist
        run: cp client.linux-x64-gnu.node dist/client.linux-x64-gnu.node
        working-directory: node/client

      - name: Run unit tests
        run: npm run test
        working-directory: node/client
