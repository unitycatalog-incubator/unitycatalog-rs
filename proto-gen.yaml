descriptors: descriptors.bin
buf_gen: buf.gen.yaml

generate:
  output_common: crates/common/src/codegen
  output_models: crates/common/src/models
  output_server: crates/server/src/codegen
  output_client: crates/client/src/codegen
  models_crate_name: unitycatalog_common
  generate_resource_enum: true
  python:
    output: python/client/src/codegen
    error_type: PyUnityCatalogError
    result_type: PyUnityCatalogResult
    typings_package_filter: unitycatalog
  node:
    output: node/client/src/codegen
    napi_error_ext_trait: NapiErrorExt
  typescript:
    output: node/client/unitycatalog
    aggregate_client_name: UnityCatalogClient
    client_crate_name: unitycatalog_client
    error_base_class: UnityCatalogError
    error_code_prefix: UC

enrich_openapi:
  spec: openapi/openapi.yaml
  jsonschema_dir: openapi/jsonschema
